syntax = "proto3";

package crawler.v1;

enum CrawlStrategy {
  CRAWL_STRATEGY_UNSPECIFIED = 0;
  CRAWL_STRATEGY_POLITE = 1;
  CRAWL_STRATEGY_FULL = 2;
  CRAWL_STRATEGY_WIKI = 3;
}

enum CrawlStatus {
  CRAWL_STATUS_UNSPECIFIED = 0;
  CRAWL_STATUS_PENDING = 1;
  CRAWL_STATUS_RUNNING = 2;
  CRAWL_STATUS_PAUSED = 3;
  CRAWL_STATUS_COMPLETED = 4;
  CRAWL_STATUS_FAILED = 5;
  CRAWL_STATUS_CANCELLED = 6;
}

enum PageStatus {
  PAGE_STATUS_UNSPECIFIED = 0;
  PAGE_STATUS_QUEUED = 1;
  PAGE_STATUS_FETCHING = 2;
  PAGE_STATUS_FETCHED = 3;
  PAGE_STATUS_FAILED = 4;
  PAGE_STATUS_SKIPPED = 5;
}

enum DeploymentMode {
  DEPLOYMENT_MODE_UNSPECIFIED = 0;
  DEPLOYMENT_MODE_LOCAL = 1;
  DEPLOYMENT_MODE_DISTRIBUTED = 2;
}
