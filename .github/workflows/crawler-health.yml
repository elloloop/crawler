name: Crawler Health Check

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build all tools
        run: go build ./...
      - name: Run tests
        run: go test ./... -race -count=1

  check-ott-sitemaps:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Check aha.video sitemap
        run: |
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "https://www.aha.video/sitemap/sitemapindex.xml" -H "User-Agent: CrawlerBot/0.1")
          echo "aha sitemap: $STATUS"
          [ "$STATUS" = "200" ] || echo "::warning::aha sitemap returned $STATUS"

      - name: Check aha.video sample page
        run: |
          # Pick first movie from sitemap
          URL=$(curl -sL "https://www.aha.video/sitemap/sitemap-detail.xml" -H "User-Agent: CrawlerBot/0.1" | grep -m1 "<loc>" | sed 's/.*<loc>//;s/<\/loc>.*//')
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$URL" -H "User-Agent: CrawlerBot/0.1")
          echo "aha sample page ($URL): $STATUS"
          [ "$STATUS" = "200" ] || echo "::warning::aha sample page returned $STATUS"

      - name: Check Hotstar sitemap (as Googlebot)
        run: |
          STATUS=$(curl -sL -o /tmp/hotstar_sitemap.xml -w "%{http_code}" \
            "https://www.hotstar.com/in/new-sitemap.xml" \
            -H "User-Agent: Googlebot/2.1 (+http://www.google.com/bot.html)" \
            --max-redirs 0)
          SITEMAPS=$(grep -c "<loc>" /tmp/hotstar_sitemap.xml || echo "0")
          echo "Hotstar sitemap: HTTP $STATUS, $SITEMAPS sub-sitemaps"
          [ "$STATUS" = "200" ] || echo "::warning::Hotstar sitemap returned $STATUS"

      - name: Check Hotstar sample page (as Googlebot)
        run: |
          URL="https://www.hotstar.com/in/movies/jab-we-met/1971011102"
          BODY=$(curl -sL "$URL" -H "User-Agent: Googlebot/2.1 (+http://www.google.com/bot.html)")
          HAS_LD=$(echo "$BODY" | grep -c "application/ld+json" || echo "0")
          echo "Hotstar sample: ld+json blocks=$HAS_LD"
          [ "$HAS_LD" -gt "0" ] || echo "::warning::Hotstar not returning JSON-LD"

  check-tmdb-api:
    runs-on: ubuntu-latest
    needs: build
    env:
      TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
    steps:
      - name: Check TMDB API
        if: env.TMDB_TOKEN != ''
        run: |
          # Test movie endpoint with all append fields
          STATUS=$(curl -sL -o /tmp/tmdb_test.json -w "%{http_code}" \
            "https://api.themoviedb.org/3/movie/278?append_to_response=credits,keywords,videos,watch/providers" \
            -H "Authorization: Bearer $TMDB_TOKEN")
          echo "TMDB API: HTTP $STATUS"

          # Verify response has expected fields
          python3 -c "
          import json
          with open('/tmp/tmdb_test.json') as f:
              d = json.load(f)
          checks = {
              'credits': 'credits' in d,
              'keywords': 'keywords' in d,
              'videos': 'videos' in d,
              'watch/providers': 'watch/providers' in d,
              'cast_has_id': len(d.get('credits',{}).get('cast',[])) > 0 and 'id' in d['credits']['cast'][0],
          }
          for k, v in checks.items():
              status = '✓' if v else '✗'
              print(f'  {status} {k}')
              if not v:
                  print(f'::warning::TMDB response missing {k}')
          "
          [ "$STATUS" = "200" ] || exit 1

      - name: Check TMDB daily exports
        run: |
          DATE=$(date +%m_%d_%Y)
          for TYPE in movie_ids tv_series_ids; do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "http://files.tmdb.org/p/exports/${TYPE}_${DATE}.json.gz")
            echo "TMDB export $TYPE: HTTP $STATUS"
          done

  check-imdb-datasets:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check IMDb dataset availability
        run: |
          for FILE in title.ratings.tsv.gz title.basics.tsv.gz title.principals.tsv.gz name.basics.tsv.gz; do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "https://datasets.imdbws.com/$FILE")
            SIZE=$(curl -sLI "https://datasets.imdbws.com/$FILE" 2>/dev/null | grep -i content-length | awk '{print $2}' | tr -d '\r')
            echo "IMDb $FILE: HTTP $STATUS, size=$SIZE"
            [ "$STATUS" = "200" ] || echo "::warning::IMDb $FILE returned $STATUS"
          done

  report:
    runs-on: ubuntu-latest
    needs: [check-ott-sitemaps, check-tmdb-api, check-imdb-datasets]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Crawler Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Source | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| OTT Sitemaps | ${{ needs.check-ott-sitemaps.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TMDB API | ${{ needs.check-tmdb-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IMDb Datasets | ${{ needs.check-imdb-datasets.result }} |" >> $GITHUB_STEP_SUMMARY
